name: Jira to GitHub Issue (Reusable)

on:
  workflow_call:
    inputs:
      jira_issue_key:
        description: "Jira issue key e.g. PROJ-123"
        required: true
        type: string
      github_owner:
        description: "GitHub owner (user or org) of the target repo"
        required: true
        type: string
      github_repo:
        description: "Target GitHub repository name (without owner)"
        required: true
        type: string
      dry_run:
        description: "If true, formats the ticket without creating a GitHub issue"
        required: false
        type: boolean
        default: false
    secrets:
      JIRA_BASE_URL:
        description: "Your Jira instance URL e.g. https://yourorg.atlassian.net"
        required: true
      JIRA_EMAIL:
        description: "Email address used to log into Jira"
        required: true
      JIRA_API_TOKEN:
        description: "Jira API token (from Jira Account Settings)"
        required: true
      GH_PAT_TOKEN:
        description: "GitHub Personal Access Token with repo and issues scope"
        required: true

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v4
        with:
          repository: Shreya-Shetty-163487/jira-to-copilot-workflow   # <-- update this after pushing
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Jira to GitHub automation
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GITHUB_OWNER: ${{ inputs.github_owner }}
          GITHUB_REPO: ${{ inputs.github_repo }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py ${{ inputs.jira_issue_key }} --dry-run
          else
            python main.py ${{ inputs.jira_issue_key }}
          fi
